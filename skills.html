    <style>
        /* Base styles */
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            color: #f0f0f0;
        }
        
        body {
            background: #121212; /* Dark background */
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #1f1f1f; /* Slightly lighter dark background */
            color: #ffffff;
            padding: 1rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            padding: 0;
            margin: 0;
        }
        
        nav ul li {
            margin: 0 15px;
        }
        
        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s, color 0.3s;
        }
        
        nav ul li a:hover,
        nav ul li a.active {
            background: #6200ea; /* Vibrant purple */
            color: #ffffff;
        }
        
        main {
            flex: 1;
            padding: 20px;
            background: #1e1e1e; /* Slightly lighter dark background for main content */
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin: 20px;
        }
        
        h1 {
            font-size: 2.4em;
            color: #e0e0e0;
            text-align: center;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #b39ddb; /* Light purple for section headers */
        }
        
        p {
            font-size: 1.1em;
            margin: 15px 0;
            line-height: 1.6;
        }
        
        .highlight {
            color: #e0e0e0;
            font-weight: 700;
        }
        
        ul {
            list-style-type: none;
            padding: 0;
            margin-left: 20px; /* Adjusted indent */
        }
        
        ul li {
            position: relative;
            padding: 10px 0;
            margin-bottom: 15px;
            font-size: 1.1em;
            color: #b0bec5; /* Light gray */
        }
        
        ul li::before {
            content: '•';
            color: #b39ddb; /* Light purple */
            font-size: 1.5em;
            position: absolute;
            left: -25px;
            top: 0;
        }
        
        footer {
            background: #1f1f1f;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.3);
        }
        
        footer ul {
            list-style: none;
            display: flex;
            justify-content: center;
            padding: 0;
            margin: 0;
        }
        
        footer ul li {
            margin: 0 15px;
        }
        
        footer ul li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s, color 0.3s;
        }
        
        footer ul li a:hover,
        footer ul li a.active {
            background: #6200ea;
            color: #ffffff;
        }
        
        .skills-category {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .cv-button {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            color: #ffffff;
            background: #6200ea; /* Vibrant purple */
            text-decoration: none;
            border-radius: 5px;
            font-weight: 700;
            transition: background 0.3s, color 0.3s;
        }

        .cv-button:hover {
            background: #3700b3; /* Darker purple for hover */
            color: #e0e0e0;
        }
    </style>
</head>
