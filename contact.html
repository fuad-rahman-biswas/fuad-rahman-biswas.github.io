    <style>/* Consistent background color with the About Me page */
body {
    background: #e9ecef;
    font-family: 'Roboto', sans-serif;
    line-height: 1.6;
    color: #333;
}

/* Header styling */
header {
    background: #383549; 
    padding: 10px 0; /* Same as about.html */
}

header nav ul {
    display: flex;
    justify-content: center;
    list-style: none;
    margin: 0;
    padding: 0;
}

header nav ul li {
    margin: 0 15px;
}

header nav ul li a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: color 0.3s;
    padding: 5px 10px;
}

header nav ul li a:hover,
header nav ul li a.active {
    color: #28a745; /* Same green as about.html */
}

/* Footer styling */
footer {
    text-align: center;
    padding: 20px;
    background: #383549; /* Same as header background */
    color: white;
    margin-top: 40px;
}

footer .footer-links {
    list-style: none;
    padding: 0;
}

footer .footer-links li {
    display: inline;
    margin: 0 10px;
}

footer .footer-links a {
    color: white;
    text-decoration: none;
}

footer .footer-links a:hover {
    text-decoration: underline;
}
    </style>
