<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* Base styles */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f2f2f2, #e6e6e6);
        }

        header {
            background: #383549; /* Dark grayish-blue color */
            color: white;
            padding: 2rem 0;
            text-align: center;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba (0, 0, 0, 0.2);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            transition: background 0.3s, color 0.3s;
            font-size: 1.2em;
        }

        header nav ul li a:hover{
            color: #ffffff;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
        } 
        header nav ul li a.active {
            color: #28a745; /* Green color for active and hover */
            border-radius: 5px;
        }

        main {
            padding-top: 100px; /* Ensure this matches the header height */
        }
        
        /* Contact Section Styles */
        .contact {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px 30px;
            border-radius: 20px;
            max-width: 900px;
            margin: 80px auto;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-in-out;
        }

        .contact h1 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 30px;
            color: #444;
        }

        .contact form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 20px;
        }

        .contact form input,
        .contact form textarea {
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.6);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
        }

        .contact form input:hover,
        .contact form textarea:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(106, 103, 206, 0.2);
        }

        .contact form input:focus,
        .contact form textarea:focus {
            border-color: #6a67ce;
            box-shadow: 0 4px 15px rgba(106, 103, 206, 0.2);
            outline: none;
        }

        .contact form textarea {
            grid-column: span 2;
            height: 150px;
            resize: none;
        }

        .contact form button {
            grid-column: span 2;
            padding: 15px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #6a67ce, #574b90);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .contact form button:hover {
            background: linear-gradient(135deg, #574b90, #6a67ce);
            transform: translateY(-3px);
        }

        /* Updated Social Media Icons */
        .contact-details {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            text-decoration: none;
        }

        .contact-details a {
            color: #6a67ce;
            font-size: 2rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .contact-details a:hover {
            color: #333;
            transform: scale(1.2);
        }

        .contact-details i {
            padding: 15px;
            border-radius: 50%;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s ease;
        }

        .contact-details i:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* Fade-in Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            background: #383549; /* Dark grayish-blue color */
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
        }

        footer .footer-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        footer .footer-links li {
            display: inline;
            margin: 0 10px;
        }

        footer .footer-links a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }

        footer .footer-links a:hover,
        footer .footer-links a.active {
            color: #5a2d9e; /* Darker purple for hover and active state */
            text-decoration: underline;
        }

        /* Media Queries for Mobile */
        @media (max-width: 768px) {
            .contact form {
                grid-template-columns: 1fr;
            }

            .contact form textarea,
            .contact form button {
                grid-column: span 1;
            }

            .contact h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
