<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Base styles */
        body {
            background: #f7f7f7;
            font-family: 'Roboto', sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* Contact Section */
        .contact {
            padding: 50px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            margin: 60px auto;
            max-width: 800px;
            width: 90%;
        }

        .contact h1 {
            text-align: center;
            font-size: 2.5rem;
            color: #383549;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        .contact form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 20px;
        }

        .contact form input,
        .contact form textarea {
            padding: 15px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            transition: border 0.3s ease;
            width: 100%;
        }

        .contact form textarea {
            grid-column: span 2;
        }

        .contact form input:focus,
        .contact form textarea:focus {
            border-color: #5a2d9e;
            outline: none;
        }

        .contact form button {
            grid-column: span 2;
            padding: 15px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            background-color: #5a2d9e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s;
        }

        .contact form button:hover {
            background-color: #4a2387;
            transform: translateY(-3px);
        }

        .contact-details {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 40px;
        }

        .contact-details a {
            font-size: 1.8rem;
            color: #5a2d9e;
            transition: color 0.3s, transform 0.3s;
        }

        .contact-details a:hover {
            color: #4a2387;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

                <li><a href="skills.html">Skills</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact">
            <h1>Contact Me</h1>
            <form action="https://formspree.io/f/mgvwdlgr" method="post">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
                <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
            <div class="contact-details">
                <a href="mailto:fuadrahman185@gmail.com" target="_blank"><i class="fa fa-envelope"></i></a>
                <a href="https://www.linkedin.com/in/fuad185" target="_blank"><i class="fa fa-linkedin"></i></a>
                <a href="https://github.com/fuad-rahman-biswas" target="_blank"><i class="fa fa-github"></i></a>
            </div>
        </section>
    </main>
