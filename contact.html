<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Fuad Rahman Biswas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Base styles */
        body {
            background: #e9ecef;
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background: #383549; /* Dark grayish-blue color */
            color: white;
            padding: 1rem 0;
            text-align: center;
        }

        header nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        header nav ul li {
            margin: 0 15px;
        }

        header nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            transition: background 0.3s, color 0.3s;
        }

        header nav ul li a:hover,
        header nav ul li a.active {
            background: #5a2d9e; /* Darker purple for hover and active state */
            color: #f0f0f0;
            border-radius: 5px;
        }

        main {
            padding: 600px;
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2.2em;
            color: #383549;
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            background: #383549;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }

        button:hover {
            background: #5a2d9e;
        }

        .contact-details {
            margin-top: 20px;
        }

        .contact-details a {
            color: #383549;
            text-decoration: none;
        }

        .contact-details a:hover {
            text-decoration: underline;
        }

        footer {
            background: #383549; /* Dark grayish-blue color */
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
        }

        footer .footer-links {
            list-style: none;
            padding: 0;
        }

        footer .footer-links li {
            display: inline;
            margin: 0 10px;
        }

        footer .footer-links a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }

        footer .footer-links a:hover,
        footer .footer-links a.active {
            color: #5a2d9e; /* Darker purple for hover and active state */
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact">
            <h1>Contact Me</h1>
            <form action="https://formspree.io/f/mgvwdlgr" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                
                <button type="submit">Send Message</button>
            </form>
            <div class="contact-details">
                <p><strong>Email:</strong> fuadrahman185@gmail.com</p>
                <p><strong>Phone:</strong> +60 173464190</p>
                <p><strong>Connect with me on:</strong> <a href="https://www.linkedin.com/in/fuad185" target="_blank">LinkedIn</a></p>
                <p><strong>View my projects on:</strong> <a href="https://github.com/fuad-rahman-biswas" target="_blank">GitHub</a></p>
            </div>
        </section>
    </main>

    <footer>
        <ul class="footer-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <p>&copy; 2024 Fuad Rahman Biswas. All rights reserved.</p>
    </footer>
</body>
</html>
